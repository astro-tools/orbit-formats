name: Bug
description: Report a defect in orbit-formats.
title: "<short summary>"
labels: ["type:bug"]
body:
  - type: textarea
    id: what_happened
    attributes:
      label: What happened
      description: Observed behavior. Include error messages and tracebacks verbatim.
    validations:
      required: true
  - type: textarea
    id: what_expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: >-
        Smallest snippet that triggers the bug — the Python (or CLI) call and, if a
        file fails to parse or convert, the smallest sample file that reproduces it.
      render: python
    validations:
      required: true
  - type: input
    id: orbit_formats_version
    attributes:
      label: orbit-formats version
      placeholder: "e.g. 0.1.0, or git sha"
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.3"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - Windows
        - macOS
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant output — tracebacks, warnings, pytest output.
      render: shell
